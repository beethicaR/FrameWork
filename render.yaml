services:
  - type: web
    name: framework-backend
    env: node
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://framework-frontend.onrender.com
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_FALLBACK_API_KEY
        sync: false

  - type: web
    name: framework-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://framework-backend.onrender.com/api
